<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@plaisolutions/client demo</title>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1>@plaisolutions/client demo</h1>
        <p class="subtitle">
          Create a chat session, save it to localStorage, and interact with
          <code>PlaiChat</code>.
        </p>
      </header>

      <section class="panel setup-panel">
        <h2>1. Setup</h2>
        <form id="setup-form" class="setup-form">
          <label>
            API URL
            <input
              id="api-url"
              type="url"
              value="https://api.plaisolutions.com"
              autocomplete="off"
            />
          </label>
          <label>
            Project token
            <input
              id="project-token"
              type="password"
              placeholder="Project bearer token"
              autocomplete="off"
            />
            <small
              ><b>Never expose this token to the client.</b> This is for demo purposes only.</small
            >
          </label>
          <label>
            Agent ID
            <input
              id="agent-id"
              type="text"
              placeholder="agent_..."
              autocomplete="off"
            />
          </label>
          <label>
            External ref
            <input
              id="external-ref"
              type="text"
              placeholder="user-123"
              autocomplete="off"
            />
          </label>
          <div class="setup-actions">
            <button id="create-session" type="submit">Create session</button>
            <button id="clear-session" type="button" class="secondary">
              Clear saved session
            </button>
          </div>
        </form>
        <p id="setup-error" class="error" hidden></p>
      </section>

      <section id="chat-panel" class="panel chat-panel" hidden>
        <div class="chat-header">
          <div>
            <h2>2. Chat</h2>
            <div id="session-info"></div>
          </div>
          <div class="chat-header-actions">
            <span id="status" class="status-pill" data-status="idle">idle</span>
            <button id="new-thread" type="button" class="secondary">
              New thread
            </button>
          </div>
        </div>

        <p id="chat-error" class="error" hidden></p>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="chat-form">
          <input
            id="input"
            type="text"
            placeholder="Type a message…"
            autocomplete="off"
          />
          <button id="send-button" type="submit">Send</button>
          <button id="stop-button" type="button" class="secondary" disabled>
            Stop
          </button>
        </form>

        <details class="raw-state">
          <summary>Raw state (debug)</summary>
          <pre id="raw-state"></pre>
        </details>
      </section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
